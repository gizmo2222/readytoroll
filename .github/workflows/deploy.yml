name: Deploy to metacrystal.com

on:
  push:
    branches: [master]
    paths-ignore:
      - 'version.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo $NEW_VERSION > version.txt
          sed -i "s/const APP_VERSION = '[^']*'/const APP_VERSION = '${NEW_VERSION}'/" readytoroll.html
          echo "VERSION=${NEW_VERSION}" >> $GITHUB_ENV

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "Bump version to ${{ env.VERSION }}"
          git push

      - name: Upload via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USER }}@metacrystal.com <<'SFTP'
          put readytoroll.html /home/nstrupp/metacrystal.com/readytoroll.html
          put rtr-sync.php /home/nstrupp/metacrystal.com/rtr-sync.php
          SFTP

      - name: Confirm
        run: echo "✅ Deployed ReadyToRoll ${{ env.VERSION }} to metacrystal.com"
